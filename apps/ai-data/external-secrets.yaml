apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-vault
  namespace: ai-data
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-ai-data
  namespace: ai-data
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: ai-data-external-secrets
          serviceAccountRef:
            name: external-secrets-vault
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-ai-auth
  namespace: ai-data
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-ai-data
    kind: SecretStore
  target:
    name: minio-ai-auth
    creationPolicy: Owner
  data:
  - secretKey: MINIO_ROOT_USER
    remoteRef:
      key: ai-data/minio
      property: MINIO_ROOT_USER
  - secretKey: MINIO_ROOT_PASSWORD
    remoteRef:
      key: ai-data/minio
      property: MINIO_ROOT_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-ai-auth
  namespace: ai-data
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-ai-data
    kind: SecretStore
  target:
    name: postgres-ai-auth
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_DB
    remoteRef:
      key: ai-data/postgres
      property: POSTGRES_DB
  - secretKey: POSTGRES_USER
    remoteRef:
      key: ai-data/postgres
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: ai-data/postgres
      property: POSTGRES_PASSWORD
